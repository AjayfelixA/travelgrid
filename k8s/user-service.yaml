apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: travelgrid
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: yourdockerhub/user-service:latest
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi

---

apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: travelgrid
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
  - port: 8000
    targetPort: 8000
