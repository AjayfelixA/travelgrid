name: TravelGrid CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/itinerary-service/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: services/itinerary-service
        run: npm ci --omit=dev

      # 4. Basic build/sanity check (node syntax check)
      - name: Verify build
        working-directory: services/itinerary-service
        run: node --check server.js

      # 5. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/travelgrid-app:latest
            ${{ secrets.DOCKER_USERNAME }}/travelgrid-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
