name: TravelGrid CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }} # base64 encoded kubeconfig

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push User Service
        run: |
          cd services/user-service
          docker build -t $DOCKER_USERNAME/user-service:latest -t $DOCKER_USERNAME/user-service:${{ github.sha }} .
          docker push $DOCKER_USERNAME/user-service:latest
          docker push $DOCKER_USERNAME/user-service:${{ github.sha }}

      - name: Build and Push Itinerary Service
        run: |
          cd services/itinerary-service
          docker build -t $DOCKER_USERNAME/itinerary-service:latest -t $DOCKER_USERNAME/itinerary-service:${{ github.sha }} .
          docker push $DOCKER_USERNAME/itinerary-service:latest
          docker push $DOCKER_USERNAME/itinerary-service:${{ github.sha }}

      - name: Build and Push Frontend
        run: |
          cd services/frontend
          docker build -t $DOCKER_USERNAME/travelgrid-frontend:latest -t $DOCKER_USERNAME/travelgrid-frontend:${{ github.sha }} .
          docker push $DOCKER_USERNAME/travelgrid-frontend:latest
          docker push $DOCKER_USERNAME/travelgrid-frontend:${{ github.sha }}

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBE_CONFIG_DATA }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          
          # Replace image tags with the specific commit SHA
          sed -i "s|yourdockerhub/user-service:latest|${{ env.DOCKER_USERNAME }}/user-service:${{ github.sha }}|g" k8s/user-service.yaml
          sed -i "s|yourdockerhub/itinerary-service:latest|${{ env.DOCKER_USERNAME }}/itinerary-service:${{ github.sha }}|g" k8s/itinerary-service.yaml
          sed -i "s|yourdockerhub/travelgrid-frontend:latest|${{ env.DOCKER_USERNAME }}/travelgrid-frontend:${{ github.sha }}|g" k8s/frontend.yaml

          kubectl apply -f k8s/user-service.yaml
          kubectl apply -f k8s/itinerary-service.yaml
          kubectl apply -f k8s/frontend.yaml

          # Verify deployments
          kubectl rollout status deployment/user-service -n travelgrid
          kubectl rollout status deployment/itinerary-service -n travelgrid
          kubectl rollout status deployment/frontend -n travelgrid
